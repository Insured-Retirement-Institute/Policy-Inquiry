  schemas:
    PolicySummary:
      type: object
      required:
        - effectiveDate
        - carrierId
        - policyLastRefreshDateTime
        - product
        - policyStatus
        - issueType
        - currency
      properties:
        effectiveDate:
          type: string
          format: date
        carrierId:
          type: string
          maxLength: 10
        carrierName:
          type: string
        policyLastRefreshDateTime:
          type: string
          format: date-time
        product:
          $ref: '#/components/schemas/Product'
        qualificationType:
          type: string
          enum:
            - INDIVIDUALRETIREMENTACCOUNTREGULAR
            - INDIVIDUALRETIREMENTACCOUNTSPOUSAL
            - INDIVIDUALRETIREMENTACCOUNTROLLOVER
            - ROTHINDIVIDUALRETIREMENTACCOUNT
            - CUSTODIALINDIVIDUALRETIREMENTACCOUNT
            - CUSTODIALROTHINDIVIDUALRETIREMENTACCOUNT
            - CUSTODIALROLLOVERINDIVIDUALRETIREMENTACCOUNT
            - QUALIFIED
            - NONQUALIFIED
            - SIMPLIFIEDEMPLOYEEPENSIONINDIVIDUALRETIREMENTACCOUNT
            - INHERITEDINDIVIDUALRETIREMENTACCOUNT
            - INHERITEDROTHINDIVIDUALRETIREMENTACCOUNT
            - NONQUALIFIEDSTRETCH
            - INDIVIDUALRETIREMENTACCOUNTSIMPLE
            - Q403B
            - Q401K
            - Q401A
            - Q457B
            - PENSIONPLAN
            - CONVERTEDINDIVIDUALRETIREMENTACCOUNT
            - ROTH403B
            - CUSTODIALINDIVIDUALRETIREMENTACCOUNTSIMPLIFIEDEMPLOYEEPENSION
            - KEOGH10
            - CORPORATEPENSION
            - GROUPTAXSHELTEREDANNUITY
            - PROFITSHARING
            - TARGETBENEFIT
            - CORPORATEDEFERREDCOMPENSATION404
            - EDUCATIONALINDIVIDUALRETIREMENTACCOUNT
            - QN457B
            - CONVERTED
            - SPOUSAL
            - CUSTODIAL
            - UNIFORMGIFTSORTRANSFERSTOMINORACT
        policyStatus:
          type: string
          enum: [PENDINGISSUED, ACTIVE, LAPSED, SURRENDERED, TERMINATED]
        restrictStatus:
          type: array
          items:
            type: string
            enum: [LEGAL, FINANCIAL, COMPLIANCE]
        issueType:
          type: string
          enum: [FULLUNDERWRITING, SIMPLIFIED, GUARANTEED]
        issueState:
          type: string
          pattern: '^[A-Z]{2}$'
        currency:
          type: string
          pattern: '^[A-Z]{3}$'

    Product:
      type: object
      required:
        - lineOfBusiness
        - planName
        - productType
        - planCode
      properties:
        lineOfBusiness:
          type: string
          enum: [LIFE, ANNUITY]
        planName:
          type: string
          maxLength: 200
        productType:
          type: string
          enum: [WHOLELIFE, TERM, UNIVERSALLIFE, ANNUITY]
        shortName:
          type: string
          maxLength: 100
          description: Short display name (optional).
        planCode:
          type: string
          pattern: '^[A-Za-z0-9]{1,50}$'

    Error:
      type: object
      properties:
        httpStatus:
          type: integer
          minimum: 400
          maximum: 599
          description: HTTP status code associated with this error
        code:
          type: string
          description: A structured error code <domain>.<category>.<subcategory>
          pattern: "^[a-zA-Z]+\\.[a-zA-Z]+\\.[a-zA-Z]+$"
        timestamp:
          type: string
          format: date-time
        message:
          type: string
          description: Technical message with details.
        userMessage:
          type: string
          description: End-user readable message.
        correlationId:
          type: string
          maxLength: 100
          description: Correlates the error to its corresponding request.
        validationErrors:
          type: array
          items:
            type: object
            properties:
              field: { type: string, description: Name of the field on which error has occurred }
              location: { type: string, description: The specific location where the error occured. }
              reason: { type: string, description: Details about why the error occurred }
        businessErrors:
          type: array
          items:
            type: object
            properties:
              code: { type: string, description: Business error classification code }
              message: { type: string, description: Specific business rule violation }
      required:
        - code
        - message