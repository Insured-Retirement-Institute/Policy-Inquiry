components:
  parameters:
    CorrelationIdHeader:
      name: correlationId
      in: header
      required: false
      description: Unique identifier to trace the request.
      schema:
        type: string
        maxLength: 100
    PolicyNumber:
        name: policyNumber
        in: path
        required: true
        description: Unique identifier of the policy.
        schema:
            type: string
            minLength: 1
            maxLength: 30
    Cusip:
        name: cusip
        in: query
        description: unique identification code. Optional; REQUIRED only when policyNumber is not globally unique.
        schema:
          type: string
          minLength: 9
          maxLength: 9
          pattern: '^[0-9]{3}[A-Z0-9]{5}[0-9]$'
    StartDate:
      name: startDate
      in: path
      required: true
      description: Start date for the query range in (YYYY-MM-DD) format 
      schema:
        type: string
        format: date
    EndDate:
      name: endDate
      in: path
      required: true
      description: End date for the query range in (YYYY-MM-DD) format 
      schema:
        type: string
        format: date
    Limit:
      name: limit
      in: path
      required: true
      description: Maximum number of records to return in a single response.
      schema:
        type: integer
        minimum: 1
        maximum: 10000
        
  responses:
    BadRequestError:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    UnauthorizedError:
      description: Unauthorized
      content:
