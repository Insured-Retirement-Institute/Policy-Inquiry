openapi: 3.1.0
info:
  title: Policy Service
  version: 1.0.0
  description: >
    Provides comprehensive servicing and inquiry capabilities for life and annuity policies.
    These endpoints allow clients to retrieve detailed information about a policy’s financial values, parties, transactions, dates, riders, distributions, producers, systematic programs, payouts, and underlying assets.
    The API supports read‑only operations and is designed to facilitate policy administration, customer servicing, compliance, and downstream processing needs.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT 

paths:
  /v1/policies/{policyNumber}/summary:
    get:
      operationId: getPolicySummary
      tags: 
        - Policy Summary
      description: >
        Retrieves a comprehensive summary of the specified policy, including
        status, effective date, carrier, product metadata, and key attributes
        used for servicing and downstream processes.
      parameters:
        - $ref: '#/components/parameters/CorrelationIdHeader'
        - $ref: '#/components/parameters/PolicyNumber'
        - $ref: '#/components/parameters/Cusip'
        - $ref: '#/components/parameters/StartDate'
        - $ref: '#/components/parameters/EndDate'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Policy summary successfully retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicySummary'
              examples:
                sample:
                  summary: Typical policy summary
                  value:
                    effectiveDate: '2024-01-15'
                    carrierId: 'CARR123'
                    carrierName: 'Contoso Life & Annuity'
                    policyLastRefreshDateTime: '2025-12-31T23:59:59Z'
                    product:
                      lineOfBusiness: LIFE
                      planName: 'Whole Life Premier'
                      productType: WHOLELIFE
                      shortName: 'WL Premier'
                      planCode: 'WLPRM001'
                    qualificationType: 'INDIVIDUALRETIREMENTACCOUNTREGULAR'
                    policyStatus: ACTIVE
                    restrictStatus: 'LEGAL'
                    issueType: FULLUNDERWRITING
                    issueState: 'NC'
                    currency: 'USD'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '405': { $ref: '#/components/responses/MethodNotAllowedError' }
        '406': { $ref: '#/components/responses/NotAcceptableError' }
        '409': { $ref: '#/components/responses/ConflictError' }
        '413': { $ref: '#/components/responses/PayloadTooLargeError' }
        '415': { $ref: '#/components/responses/UnsupportedMediaTypeError' }
        '422': { $ref: '#/components/responses/UnprocessableEntityError' }
        '429': { $ref: '#/components/responses/TooManyRequestsError' }
        '500': { $ref: '#/components/responses/InternalServerError' }
        '502': { $ref: '#/components/responses/BadGatewayError' }
        '503': { $ref: '#/components/responses/ServiceUnavailableError' }
        '504': { $ref: '#/components/responses/GatewayTimeoutError' }

