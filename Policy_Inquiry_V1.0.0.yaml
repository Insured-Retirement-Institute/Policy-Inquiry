                  survivorReduction:
                    type: object
                    properties:
                      primaryreductionCode:
                        type: string
                        pattern: '^[A-Za-z0-9._-]{1,50}$'
                      jointreductionCode:
                        type: string
                        pattern: '^[A-Za-z0-9._-]{1,50}$'
              incomePayments:
                type: object
