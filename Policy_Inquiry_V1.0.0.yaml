          format: date
        previousProgramDate:
          type: string
          format: date
        optedNextProgramDate:
          type: string
          format: date
        nextProgramDate:
          type: string
          format: date
        amountType:
          type: string
          enum:
          - AMOUNT
          - PERCENTAGE
          - MAX
          - FREEWITHDRAWALAMOUNT
          - WITHDRAWALUNTILBASIS
          - EARNINGSONLY
          - MODIFIEDEARNINGSONLY
        requestedAmount:
          type:
            - number
            - "null"
          minimum: 0
          maximum: 9999999999.99
        requestedPercentage:
          type: number
          description: Requested Percentage value
          minimum: 0
          maximum: 100
        externalArrangementId:
          type: string
          maxLength: 100
        numOfModalOccurrences:
          type: number
          minimum: 0
          maximum: 9999999999.99
        modalAmt:
          type: number
          minimum: 0
          maximum: 9999999999.99
        modalPct:
          type: number
          minimum: 0
          maximum: 100
        sourceTransferAmtType:
          type: string
          enum: [AMOUNT, PERCENTAGE, PRO_RATA, SPECIFIED_FUNDS, ALL_FUNDS, OTHER]
        destTransferAmtType:
          type: string
          enum: [AMOUNT, PERCENTAGE, PRO_RATA, SPECIFIED_FUNDS, ALL_FUNDS, OTHER]
        arrSource:
          type: string
          enum: [TransferAmt, TransferPct]
        taxWithholdingInstructions:
          type: array
          items:
            $ref: '#/components/schemas/TaxWithholdingInstruction'
        arrSubType:
          type: string
          pattern: '^[A-Za-z0-9_ -]{1,100}$'
        dayOfMonth:
          type: string
          pattern: '^(?:[1-9]|[12][0-9]|3[01])$'
        productCode:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,50}$'
        parties:
          type: array
          items:
            type: object
            required:
              - partyRole
              - taxId
              - paymentForm
              - percentage
              - bankId
            properties:
              partyRole:
                type: string
                enum:
                - PAYOR
                - PAYEE
              taxId:
                type: string
                maxLength: 9
              percentage:
                type: number
                minimum: 0
                maximum: 100
              bankId:
                type: string
                maxLength: 100
              addressId:
                type: string
                maxLength: 100
              paymentForm:
                type: string
                enum: [DTCC, ACH, CHECK, WIRE, EXCHANGE]
      allOf:
        - if:
            properties:
              amountType:
                const: AMOUNT
            required:
              - amountType
          then:
            required:
              - requestedAmount
            not:
              required:
                - requestedPercentage
        - if:
            properties:
              amountType:
                const: PERCENTAGE
            required:
              - amountType
          then:
            required:
              - requestedPercentage
            not:
              required:
                - requestedAmount
        - if:
          properties:
            amountType:
              enum: [MAX, FREEWITHDRAWALAMOUNT, WITHDRAWALUNTILBASIS, EARNINGSONLY]
          then:
            required: [amountType]
            not:
              anyOf:
                - required: [requestedAmount]
                - required: [requestedPercentage]

