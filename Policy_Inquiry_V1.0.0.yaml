      - policyStatus
      - issueType
      - currency
      properties:
        effectiveDate:
          type: string
          format: date
        cusip:
          type: string
          minLength: 9
          maxLength: 9
          pattern: '^[0-9]{3}[A-Z0-9]{5}[0-9]$'
        carrierId:
          type: string
          maxLength: 10
        carrierName:
          type: string
          maxLength: 200
        policyLastRefreshDateTime:
          type: string
          format: date-time
        product:
          $ref: '#/components/schemas/Product'
        qualificationType:
          type: string
          enum:
            - "Non-Qualified"
            - "Solo 401k"
            - "401k"
            - "403b"
            - "457 Deferred Compensation"
            - "Inherited IRA"
            - "IRA Spousal"
            - "Educational IRA"
            - "IRA"
            - "IRA Rollover"
            - "IRA Transfer"
            - "Roth IRA"
            - "Roth IRA - Inherited"
            - "SEP IRA"
            - "SIMPLE IRA"
            - "Pension Plan"
            - "Cash Balance Plan-Defined Contributions"
            - "Solo Defined Benefit"
            - "Cash Balance Plan-Defined Benefit"
            - "Profit Sharing Plan"
            - "Money Purchase Plan"
            - "SAREP"
            - "401g"
            - "HR10"
            - "Welfare Benefit Plan"
            - "Roth 401K"
            - "Roth 403b"
            - "Roth 457"
        policyStatus:
          type: string
          enum:
          - PENDINGISSUED
          - ACTIVE
          - LAPSED
          - SURRENDERED
          - TERMINATED
        hasRestriction:
          type: boolean
        restrictions:
          type: array
          items:
            $ref: '#/components/schemas/RestrictionReason'
        issueType:
          type: string
          enum:
          - FULLUNDERWRITING
          - SIMPLIFIED
          - GUARANTEED
        issueState:
          type: string
          pattern: '^[A-Z]{2}$'
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
      allOf:
        - if:
            properties:
              hasRestriction:
                const: true
            required: [hasRestriction]
          then:
            required: [restrictions]
            properties:
              restrictions:
                minItems: 1
          else:
            not:
              required: [restrictions]

