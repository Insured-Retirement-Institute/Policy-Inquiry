        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '405':
          $ref: '#/components/responses/MethodNotAllowedError'
        '406':
          $ref: '#/components/responses/NotAcceptableError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '413':
          $ref: '#/components/responses/PayloadTooLargeError'
        '415':
          $ref: '#/components/responses/UnsupportedMediaTypeError'
        '422':
          $ref: '#/components/responses/UnprocessableEntityError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '502':
          $ref: '#/components/responses/BadGatewayError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
        '504':
          $ref: '#/components/responses/GatewayTimeoutError'
components:
  parameters:
    CorrelationIdHeader:
      name: correlationId
      in: header
      required: false
      description: Unique identifier to trace the request.
      schema:
        type: string
        maxLength: 100
    PolicyNumber:
      name: policyNumber
      in: path
      required: true
      description: Unique identifier of the policy.
      schema:
        type: string
        minLength: 1
        maxLength: 30
    AssociatedFirmId:
      name: associatedFirmId
      in: query
      required: false
      description: Optional firm/linkage identifier (preferred location per IRI).
      schema:
        type: string
        minLength: 1
        maxLength: 65
    StartDate:
      name: startDate
      in: query
      required: false
      description: Filter transactions from this date (inclusive).
      schema:
        type: string
        format: date
    EndDate:
      name: endDate
      in: query
      required: false
      description: Filter transactions up to this date (inclusive).
      schema:
        type: string
        format: date
    TransactionTypes:
      name: types
      in: query
      required: false
      description: Filter by one or more transaction types (comma-separated).
      schema:
        type: string
        pattern: '^([A-Za-z][A-Za-z0-9]*)(,[A-Za-z][A-Za-z0-9]*)*$'
    Limit:
      name: limit
      in: query
      required: false
      description: Page size (default 50, max 200).
      schema:
        type: integer
        minimum: 1
        maximum: 200
    PartyRole:
      name: partyRole
      in: query
      required: false
      description: Filter parties by role.
      schema:
        type: string
        enum:
        - Owner
        - JointOwner
        - Annuitant
        - JointAnnuitant
        - Payee
        - Payor
        - PrimaryBeneficiary
        - ContingentBeneficiary
        - Agent
        - Trustee
    PartyStatus:
      name: partyStatus
      in: query
      required: false
      description: Filter parties by status.
      schema:
        type: string
        enum:
        - APPROVED
        - NOTAPPROVED
        - PROCESSED
    TransactionId:
      name: transactionId
      in: query
      required: false
      description: |
        Unique identifier assigned to the transaction.
      schema:
        type: string
        pattern: '^[A-Za-z0-9._-]{1,100}$'
  responses:
    BadRequestError:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
    ForbiddenError:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
    NotFoundError:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
    MethodNotAllowedError:
      description: Method Not Allowed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
    NotAcceptableError:
      description: Not Acceptable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
      headers:
        correlationId:
          $ref: '#/components/headers/correlationId'
    ConflictError:
      description: 'A conflicting policy operation is in progress or the request duplicates
        an in-flight action. '
      content:
        application/json:
          schema:
