openapi: 3.1.0
info:
  title: Policy Service
  version: 1.0.0
  description: |
    Provides comprehensive servicing and inquiry capabilities . These endpoints allow clients to retrieve detailed information about a policy, financial values, parties, transactions, dates, riders, funds, producers, systematic programs, payouts, and underlying assets.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
paths:
  /v1/policies/{policyNumber}/summary:
    get:
      operationId: getPolicySummary
      tags:
      - Policy Summary
      description: |
        Retrieves a comprehensive summary of the specified policy, including
        status, effective date, carrier, product metadata, and key attributes used
        for servicing and downstream processes.
      parameters:
      - $ref: '#/components/parameters/CorrelationIdHeader'
      - $ref: '#/components/parameters/PolicyNumber'
      - $ref: '#/components/parameters/AssociatedFirmId'
      responses:
        '200':
          $ref: '#/components/responses/getPolicySummaryResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '405':
          $ref: '#/components/responses/MethodNotAllowedError'
        '406':
          $ref: '#/components/responses/NotAcceptableError'
        '409':
          $ref: '#/components/responses/ConflictError'
        '413':
          $ref: '#/components/responses/PayloadTooLargeError'
        '415':
          $ref: '#/components/responses/UnsupportedMediaTypeError'
        '422':
          $ref: '#/components/responses/UnprocessableEntityError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
        '500':
          $ref: '#/components/responses/InternalServerError'
        '502':
          $ref: '#/components/responses/BadGatewayError'
        '503':
          $ref: '#/components/responses/ServiceUnavailableError'
        '504':
          $ref: '#/components/responses/GatewayTimeoutError'

