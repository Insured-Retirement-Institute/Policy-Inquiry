    TransactionsList:
      type: object
      properties:
        transactions:
          type: array
          items:
            type: object
            required:
            - transactionId
            - planCode
            - requestDate
            - effectiveDate
            - processDate
            - status
            - transactionReason
            - timestamp
            - version
            properties:
              transactionId:
                type: string
                pattern: '^[A-Za-z0-9._-]{1,100}$'
              originalTransactionId:
                type: string
                pattern: '^[A-Za-z0-9._-]{1,100}$'
              partyPolicyChangeReferenceId:
                type: string
                pattern: '^[A-Za-z0-9._-]{1,100}$'
              partyPolicyNewReferenceId:
                type: string
                pattern: '^[A-Za-z0-9._-]{1,100}$'
              planCode:
                type: string
                pattern: '^[A-Za-z0-9._-]{1,50}$'
              parentId:
                type: string
                pattern: '^[A-Za-z0-9._-]{1,100}$'
              transactionType:
                type: string
                enum: [SubsequentPayment, OneTimePremium, PartialWithdrawalOneTime, SystematicPartialWithdrawal, RequiredMinimumDistributionOneTime, SystematicRequiredMinimumDistribution, FullSurrender, FundTransfer, FundAllocationsChange, Sweep, DollarCostAverage, NewLoan, LoanRepaymentOneTime, SystematicLoanRepayment, Annuitization, SystematicAnnuityPayout, PayoutAmountChange, ServiceCharge, RiderCharge, ValueAdjustment, InterestCredit, AddressChange, EmailChange, PhoneNumberChange, BeneficiaryChange, OwnerChange, BankAccountChange, CommunicationPreferenceChange, Reinstatement, Lapse, Other]
              requestDate:
                type: string
                format: date
              effectiveDate:
                type: string
                format: date
              processDate:
                type: string
                format: date
              reversalDate:
                type: string
                format: date
              status:
                type: string
                enum:
                - Pending
                - Completed
                - Failed
                - Reversed
                - Canceled
                - PendingReversal
              transactionReason:
                type: string
                enum: [ONETIMEPREMIUM, GRACEPERIODPREMIUM, REINSTATEMENTPREMIUM, EXCHANGE1035, SURRENDER, AMOUNTEXCESSTOMEC, AMOUNTEXCESSTOGUIDELINE, CURRENTVALUE, COSTBASIS, GUIDELINESINGLEPREMIUM, GUIDELINELEVELPREMIUM, SEVENPAYPREMIUM, TOTALYTDPREMIUMAMOUNT, FACEDECREASECOVERAGE, INITIALPREMIUMEXPIRATION, COMPLIANCE, STARTINGPRICE, LUMPSUM, FIVEYEARDEFERRAL, SPOUSALCONTINUATION, DISCOUNT, CONTROLBUSINESSINDICATOR, NATIONALCHANGEOFADDRESS]
              transactionAmounts:
                $ref: '#/components/schemas/TransactionAmounts'
              charges:
                type: array
                items:
                  type: object
                  properties:
                    chargeType:
                      type: string
                      enum: [SERVICE_CHARGE, RIDER_CHARGE, ADMINISTRATIVE_CHARGE, SURRENDER_CHARGE, MVA, TAX, COST_OF_INSURANCE, EXPENSE_CHARGE, UNIT_EXPENSE_CHARGE, WITHDRAWAL_CHARGE, OTHER]
                    isChargeWaived:
                      type: boolean
                    chargeWaiverReason:
                      type: string
                    chargeAmount:
                      type: number
                      minimum: 0
                      maximum: 9999999999.99
                    chargeAppliedRate:
                      type: number
                      minimum: 0
                      maximum: 9999999999.99
              taxWithholdingInstructions:
                type: array
                items:
                  $ref: '#/components/schemas/TaxWithholdingInstruction'
              timestamp:
                type: string
                format: date-time
              isReverseInitiated:
                type: boolean
              version:
                type: integer
                format: int32
              externalIdentifiers:
                type: object
                properties:
                  referenceNumber:
                    type: string
                    pattern: '^[A-Za-z0-9._-]{1,100}$'
                  externalTransactionId:
                    type: string
                    pattern: '^[A-Za-z0-9._-]{1,100}$'
                  externalArrangementId:
                    type: string
                    pattern: '^[A-Za-z0-9._-]{1,100}$'
    
    TransactionAmounts:
      type: object
      description: Details of financial amounts associated with the transaction
      properties:
        requestedAmount:
          type: number
          minimum: 0
          maximum: 9999999999.99
        requestedPercentage:
          type: number
          minimum: 0
          maximum: 100
        amountType:
          type: string
          enum: [AMOUNT, PERCENTAGE, MAX, FREEWITHDRAWALAMOUNT, WITHDRAWALUNTILBASIS, EARNINGSONLY]
        disbursementType:
          type: string
          enum: [GROSS, NET]
        disbursementPaymentForm:
          type: string
          enum: [DTCC, EFT, ACH, CHECK, WIRE]
      required:
        - amountType
        - disbursementType
      allOf:
          - if:
              properties:
                amountType:
                  const: AMOUNT
              required:
                - amountType
            then:
              required:
                - requestedAmount
              not:
                required:
                  - requestedPercentage
          - if:
              properties:
                amountType:
                  const: PERCENTAGE
              required:
                - amountType
            then:
              required:
                - requestedPercentage
              not:
                required:
                  - requestedAmount
          - if:
            properties:
              amountType:
                enum: [MAX, FREEWITHDRAWALAMOUNT, WITHDRAWALUNTILBASIS, EARNINGSONLY]
            then:
              required: [amountType]
              not:
                anyOf:
                  - required: [requestedAmount]
                  - required: [requestedPercentage]
    
    UnderlyingAssets:
      type: object
      properties:
        underlyingAssets:
          type: array
          items:
            type: object
            required:
            - insuranceActivityFundID
            properties:
              insuranceActivityFundID:
                type: string
                pattern: '^[A-Za-z0-9._-]{1,50}$'
              insuranceActivityFundAmount:
                type: string
                pattern: '^-?\d+(\.\d+)?$'
              insuranceActivityFundAmountDebitCreditIndicator:
                type: string
                enum: [DEBIT, CREDIT]
              insuranceActivityFundUnitAmount:
                type: string
                pattern: '^-?\d+(\.\d+)?$'
              insuranceActivityFundUnitAmountDebitCreditIndicator:
                type: string
                enum: [DEBIT, CREDIT]
              insuranceActivityFundUnitPriceAmount:
                type: string
                pattern: '^-?\d+(\.\d+)?$'
              insuranceProductSubAccountProductFullName:
                type: string
                maxLength: 200
              insuranceProductSubAccountAssetClassCode:
                type: string
                pattern: '^[A-Za-z0-9._-]{1,50}$'
              insuranceActivityMutualFundCusipNumber:
                type: string
                pattern: '^[A-Za-z0-9]{9}$'
              insuranceActivityFundMVAAmount:
                type: string
                pattern: '^-?\d+(\.\d+)?$'
              insuranceActivityFundMVAAmountDebitCreditIndicator:
                type: string
                enum: [DEBIT, CREDIT]
              insuranceActivityFundAdministrativeChargeAmount:
                type: string
                pattern: '^-?\d+(\.\d+)?$'
              insuranceActivityFundAdministrativeChargeAmountDebitCreditIndicator:
                type: string
                enum: [DEBIT, CREDIT]
              insuranceActivityFundSurrenderChargeAmount:
                type: string
                pattern: '^-?\d+(\.\d+)?$'
              insuranceActivityFundSurrenderChargeAmountDebitCreditIndicator:
                type: string
                enum: [DEBIT, CREDIT]
              insuranceActivityFundEmployerAmount:
                type: string
                pattern: '^-?\d+(\.\d+)?$'
              insuranceActivityFundEmployerAmountDebitCreditIndicator:
                type: string
                enum: [DEBIT, CREDIT]
              insuranceActivityFundEmployeeAmount:
                type: string
                pattern: '^-?\d+(\.\d+)?$'
              insuranceActivityFundEmployeeAmountDebitCreditIndicator:
                type: string
                enum: [DEBIT, CREDIT]

    TaxWithholdingInstruction:
      type: object
      description: List of tax withholding instruction entries
      properties:
        party:
          anyOf:
            - $ref: '#/components/schemas/IndividualIdentity'
            - $ref: '#/components/schemas/EntityIdentity'
        taxWithholdingType:
          type: string
          enum: [FEDERAL, STATE, NRA, BACKUP]
        taxRateToUse:
          type: string
          enum: [NOWITHHOLDINGELECTED, USEVALUESENTERED, NOWITHHOLDINGALLOWED, USEDEFAULTTABLE]
        filingStatus:
          type: string
          enum: [SINGLE, DOMESTICPARTNERSHIP, DEFAULT, MARRIED, HEADOFHOUSEHOLD, WIDOWED, DIVORCED]
        dollar:
          type: number
          description: Computed tax amount
          minimum: 0
          maximum: 9999999999.99
        percentage:
          type: number
          description: Computed tax percentage
          minimum: 0
          maximum: 100
        exemptions:
          type: integer
          minimum: 0
          maximum: 99
        taxJurisdiction:
          type: string
          maxLength: 50
      required:
        - taxWithholdingType
        - taxRateToUse
      oneOf:
        - description: Use a fixed dollar amount for withholding.
          required: [dollar]
        - description: Use a percentage for withholding.
          required: [percentage]
      allOf:
        - if:
            properties:
              taxWithholdingType:
                const: STATE
          then:
            required:
              - taxJurisdiction

    IndividualParty:
      description: Schema for individual party data
      type: object
      allOf:
        - $ref: '#/components/schemas/IndividualIdentity'
        - $ref: '#/components/schemas/PartyRelationship'

    EntityParty:
      description: Schema for entity party data
      type: object
      allOf:
        - $ref: '#/components/schemas/EntityIdentity'
        - $ref: '#/components/schemas/PartyRelationship'

    IndividualIdentity:
      description: Schema for individual identity data
      required: [firstName, lastName, taxId]
      type: object
      properties:
        type:
          type: string
          const: individual
        firstName:
          type: string
          minLength: 1
          maxLength: 105
          pattern: '^[a-zA-Z0-9=()*@#\s.,''_/~%$!();:&"®`\\?\-]{1,105}$'
        middleName:
          type: string
          minLength: 1
          maxLength: 105
          pattern: '^[a-zA-Z0-9=()*@#\s.,''_/~%$!();:&"®`\\?\-]{1,105}$'
        lastName:
          type: string
          minLength: 1
          maxLength: 105
          pattern: '^[a-zA-Z0-9=()*@#\s.,''_/~%$!();:&"®`\\?\-]{1,105}$'
        taxId:
          type: string
          maxLength: 9

    PartyRelationship:
      description: Schema for party relationship data
      type: object
      required: [relationships]
      properties:
        relationships:
          type: array
          minItems: 1
          maxItems: 2
          items:
            type: string
            enum:
              - owner
              - jointOwner
              - annuitant
              - jointAnnuitant
              - primaryBeneficiary
              - contingentBeneficiary

    EntityIdentity:
      description: Schema for entity identity data
      type: object
      required: [type, name, taxId]
      properties:
        type:
          type: string
          const: entity
        name:
          type: string
          minLength: 1
          maxLength: 100
          pattern: '^[\w=()*@#\s.,''\/~%$!;:&"®`\\?\-]{1,100}$'
        taxId:
          type: string
          maxLength: 9

    Bank:
      type: object
      required:
        - nameOnAccount
        - accountType
        - accountNumber
        - routingNumber
      properties:
        bankId:
          type: string
          maxLength: 100
        nameOnAccount:
          type: string
          maxLength: 100
        accountStatus:
          type: string
          enum:
          - ACTIVEBANKACCOUNT
          - TERMINATEDBANKACCOUNT
        accountType:
          type: string
          enum:
          - CHECKING
          - SAVINGS
          - CREDITCARDACCOUNT
          - DEBITCARDACCOUNT
          - BROKERAGEACCOUNT
          - CERTIFICATEOFDEPOSITACCOUNT
        accountNumber:
          type: string
          pattern: '^\d{4,17}$'
          maxLength: 17
        routingNumber:
          type: string
          pattern: '^\d{9}$'
        branchName:
          type: string
          maxLength: 100

    Address:
      type: object
      required:
        - addressType
        - addressLine1
        - city
        - state
        - zipCode
      properties:
        addressId:
          type: string
          maxLength: 100
        addressType:
          type: string
          enum:
          - RESIDENCE
          - BUSINESS
          - POBOXSEASONAL
          - OTHER
        addressLine1:
          type: string
          maxLength: 100
        addressLine2:
          type: string
          maxLength: 100
        addressLine3:
          type: string
          maxLength: 100
        addressLine4:
          type: string
          maxLength: 100
        addressLine5:
          type: string
          maxLength: 100
        city:
          type: string
          maxLength: 100
        state:
          type: string
          pattern: '^[A-Z]{2}$'
        zipCode:
          type: string
          pattern: '^[0-9A-Za-z -]{3,10}$'
        zipCodeExtension:
          type: string
          pattern: '^[0-9A-Za-z]{1,4}$'
        country:
          type: string
          pattern: '^[A-Z]{2}$'

    
    Phone:
      type: object
      required: [countryCode, areaCode, dialNumber]
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        phoneType:
          type: string
          enum: [MOBILE, HOME, BUSINESS, CLAIMCENTER, CUSTOMERSERVICE, CORPORATEOFFICE, FAX, UNKNOWN, OTHER]
        countryCode:
          type: string
          pattern: '^\+?[0-9]{1,3}$'
        areaCode:
          type: string
          pattern: '^[0-9]{2,5}$'
        dialNumber:
          type: string
          pattern: '^[0-9]{4,12}$'
        extension:
          type: string
          pattern: '^[A-Za-z0-9-]{1,10}$'
        bestTime:
          type: string
          enum: [MORNING, AFTERNOON, EVENING, ANYTIME]
        timezone:
          type: string
          pattern: '^[A-Za-z_]+/[A-Za-z_]+(?:/[A-Za-z_]+)?$'
        isPreferred:
          type: boolean
        phoneId:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,100}$'
    
    Email:
      type: object
      required: [emailAddress]
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        emailType:
          type: string
          enum: [PERSONAL, BUSINESS, CUSTOMERSERVICE, OTHER]
        emailAddress:
          type: string
          format: email
          pattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
        isPreferred:
          type: boolean
        emailId:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,100}$'

    Identification:
      type: object
      required: [startDate, endDate]
      properties:
        identificationId:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,100}$'
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        identificationType:
          type: string
          enum: [PASSPORT, STATEPHOTOID, DRIVERLICENSENUMBER, SSN, TIN, EXTERNAL, EIN, OTHER]
        identificationKey:
          type: string
          pattern: '^[A-Za-z0-9._-]{1,100}$'
        identificationValue:
          type: string
          maxLength: 100
        identificationDescription:
          type: string
          maxLength: 255
        issueState:
          type: string
          enum: [AA, AE, AL, AP, AK, AZ, AR, AS, CA, CO, CT, DC, DE, FL, GA, GU, HI, ID, IL, IN, IA, KS, KY, LA, ME, MD, MA, MI, MN, MS, MO, MP, MT, NE, NV, NH, NJ, NM, NY, NC, ND, OH, OK, OR, PA, PR, RI, SC, SD, TN, TX, UM, UT, VT, VA, VI, WA, WV, WI, WY]
