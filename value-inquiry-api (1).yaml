openapi: 3.0.3
info:
  title: Value Inquiry API
  description: API for retrieving policy value information
  version: '1.0.0'

servers:
  - url: /api
    description: API base URL

paths:
  /v1/policies/{planCode}/{policyNumber}/valueinquiry:
    post:
      summary: Get policy value information
      description: Retrieves detailed value information for a specific policy
      operationId: getPolicyValueInquiry
      parameters:
        - name: planCode
          in: path
          required: true
          description: The plan code of the policy
          schema:
            type: string
            example: "BFIXUL1S"
        - name: policyNumber
          in: path
          required: true
          description: The policy number to query
          schema:
            type: string
            example: "VIP568"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - correlationId
                - requestDate
                - requestTime
                - id
                - carrierCode
                - policyReferenceId
                - binNumber
                - cusip
                - parties
              properties:
                correlationId:
                  type: string
                  description: Unique identifier for correlating request and response
                  example: "657bddcddc353e5fc5f45acd"
                requestDate:
                  type: string
                  format: date
                  description: Date of the request
                  example: "2023-01-01"
                requestTime:
                  type: string
                  description: Time of the request with timezone
                  example: "16:26:57-04:00"
                id:
                  type: string
                  description: Unique identifier for the request
                  example: "657bddcddc353e5fc5f45acd"
                carrierCode:
                  type: string
                  description: Identifier for the carrier
                  example: "ALIV"
                policyReferenceId:
                  type: string
                  description: Reference identifier for the policy
                  example: "563f35b74b904f87a2e3ddbde0c3c541"
                binNumber:
                  type: string
                  description: BIN number of the policy
                  example: "34568"
                cusip:
                  type: string
                  description: CUSIP number
                  example: "56789"
                parties:
                  type: array
                  items:
                    type: object
                    required:
                      - partyId
                      - partyType
                      - firstName
                      - lastName
                      - partyRole
                      - identifications
                    properties:
                      partyId:
                        type: string
                        description: Unique identifier for the party
                        example: "Party_PI_1"
                      partyType:
                        type: string
                        description: Type of party
                        example: "INDIVIDUAL"
                      firstName:
                        type: string
                        description: First name of the party
                        example: "KAREN"
                      lastName:
                        type: string
                        description: Last name of the party
                        example: "BATES"
                      partyRole:
                        type: string
                        description: Role of the party
                        example: "PAYOR"
                      identifications:
                        type: array
                        items:
                          type: object
                          required:
                            - identificationType
                            - identificationValue
                            - niprNumber
                          properties:
                            identificationType:
                              type: string
                              description: Type of identification
                              example: "SSN"
                            identificationValue:
                              type: string
                              description: Value of the identification
                              example: "123456789"
                            niprNumber:
                              type: string
                              description: NIPR number
                              example: "123456789"
            example:
              correlationId: "657bddcddc353e5fc5f45acd"
              requestDate: "2023-01-01"
              requestTime: "16:26:57-04:00"
              id: "657bddcddc353e5fc5f45acd"
              carrierCode: "ALIV"
              policyReferenceId: "563f35b74b904f87a2e3ddbde0c3c541"
              binNumber: "34568"
              cusip: "56789"
              parties: [
                {
                  partyId: "Party_PI_1",
                  partyType: "INDIVIDUAL",
                  firstName: "KAREN",
                  lastName: "BATES",
                  partyRole: "PAYOR",
                  identifications: [
                    {
                      identificationType: "SSN",
                      identificationValue: "123456789",
                      niprNumber: "123456789"
                    }
                  ]
                },
                {
                  partyId: "Party_Carrier",
                  partyType: "ORGANIZATION",
                  fullName: "KAREN",
                  organizationCode: "AVB123",
                  partyRole: "CARRIER"
                },
                {
                  partyId: "Party_Distributor",
                  partyType: "ORGANIZATION",
                  fullName: "KAREN",
                  organizationCode: "AVB123",
                  partyRole: "DISTRIBUTOR"
                },
                {
                  partyId: "Party_Agent",
                  partyType: "ORGANIZATION",
                  fullName: "KAREN",
                  organizationCode: "AVB123",
                  partyRole: "DISTRIBUTOR"
                }
              ]
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValueInquiryResponse'
        '400':
          description: Bad Request - Invalid input parameters or malformed request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: error
                correlationId: "657bddcddc353e5fc5f45acd"
                errors: [
                  { "errorCode": "400", "error": "Invalid policy number format" }
                ]
                version: "1"
        '401':
          description: Unauthorized - Authentication credentials are missing or invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: error
                correlationId: "657bddcddc353e5fc5f45acd"
                errors: [
                  { "errorCode": "401", "error": "Missing authentication token" }
                ]
                version: "1"
        '404':
          description: Not Found - The requested policy was not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: error
                correlationId: "657bddcddc353e5fc5f45acd"
                errors: [
                  { "errorCode": "404", "error": "Policy not found" }
                ]
                version: "1"
        '408':
          description: Request Timeout - The request took too long to complete
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: error
                correlationId: "657bddcddc353e5fc5f45acd"
                errors: [
                  { "errorCode": "408", "error": "Request processing timeout" }
                ]
                version: "1"
        '500':
          description: Internal Server Error - An unexpected error occurred on the server
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: error
                correlationId: "657bddcddc353e5fc5f45acd"
                errors: [
                  { "errorCode": "500", "error": "Internal server error" }
                ]
                version: "1"
        '504':
          description: Gateway Timeout - The upstream service did not respond in time
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: error
                correlationId: "657bddcddc353e5fc5f45acd"
                errors: [
                  { "errorCode": "504", "error": "Gateway timeout" }
                ]
                version: "1"
  /v1/policies/{planCode}/{policyNumber}/valueinquiryquote:
